name: YouSound
options:
  bundleIdPrefix: com.yousound
  deploymentTarget:
    iOS: "17.0"
packages:
  YouTubeKit:
    url: https://github.com/alexeichhorn/YouTubeKit
    from: "0.4.8"
targets:
  YouSound:
    type: application
    platform: iOS
    sources:
      - AudioPlayerManager.swift
      - ContentView.swift
      - LibraryStore.swift
      - Models.swift
      - YouSoundApp.swift
      - YouTubeAPI.swift
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: YouSound
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yousound.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: YouTubeKit
schemes:
  YouSound:
    build:
      targets:
        YouSound: all
    run:
      config: Release
